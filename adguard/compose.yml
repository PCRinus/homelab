services:
  adguard:
    image: adguard/adguardhome:v0.107.73
    container_name: adguard
    command: ["--web-addr", "0.0.0.0:3001", "--config", "/opt/adguardhome/conf/AdGuardHome.yaml", "--work-dir", "/opt/adguardhome/work", "--no-check-update"]
    env_file:
      - ../.env
    volumes:
      - ${DOCKER_DATA}/adguard/work:/opt/adguardhome/work
      - ${DOCKER_DATA}/adguard/conf:/opt/adguardhome/conf
    ports:
      - "192.168.1.166:53:53/tcp"   # DNS (bound to LAN IP to avoid systemd-resolved conflict)
      - "192.168.1.166:53:53/udp"   # DNS
      - "3001:3001"                  # Admin web UI (3001 avoids conflict with Homepage on 3000)
    dns:
      - 1.1.1.1
      - 1.0.0.1
      - 8.8.8.8
    cap_add:
      - NET_ADMIN
    networks:
      - media-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  media-net:
    external: true
