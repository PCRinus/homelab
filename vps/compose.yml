name: pangolin

services:
  tailscale:
    image: tailscale/tailscale:v1.98.4
    container_name: tailscale
    hostname: ${TS_HOSTNAME:-homeserver-vps}
    network_mode: host
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_AUTH_ONCE: ${TS_AUTH_ONCE:-true}
      TS_EXTRA_ARGS: ${TS_EXTRA_ARGS:-}
      TS_KUBE_SECRET: ""
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
    volumes:
      - ${TAILSCALE_STATE_DIR:-./tailscale-state}:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped

  pangolin:
    image: docker.io/fosrl/pangolin:1.19.4
    container_name: pangolin
    restart: unless-stopped
    volumes:
      - ${PANGOLIN_CONFIG_DIR:-/opt/pangolin/config}:/app/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/"]
      interval: 10s
      timeout: 10s
      retries: 15

  gerbil:
    image: docker.io/fosrl/gerbil:1.4.2
    container_name: gerbil
    restart: unless-stopped
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --reachableAt=http://gerbil:3004
      - --generateAndSaveKeyTo=/var/config/key
      - --remoteConfig=http://pangolin:3001/api/v1/
    volumes:
      - ${PANGOLIN_CONFIG_DIR:-/opt/pangolin/config}:/var/config
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - 51820:51820/udp
      - 21820:21820/udp
      - 443:443
      - 80:80

  traefik:
    image: docker.io/traefik:v3.7.5
    container_name: traefik
    restart: unless-stopped
    network_mode: service:gerbil
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --configFile=/etc/traefik/traefik_config.yml
    volumes:
      - ${PANGOLIN_CONFIG_DIR:-/opt/pangolin/config}/traefik:/etc/traefik:ro
      - ${PANGOLIN_CONFIG_DIR:-/opt/pangolin/config}/letsencrypt:/letsencrypt
      - ${PANGOLIN_CONFIG_DIR:-/opt/pangolin/config}/traefik/logs:/var/log/traefik

  dozzle-agent:
    image: ghcr.io/amir20/dozzle:v10.6.6
    container_name: dozzle-agent
    command: agent
    depends_on:
      - tailscale
    environment:
      DOZZLE_HOSTNAME: ${DOZZLE_HOSTNAME:-homeserver-vps}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${DOZZLE_AGENT_BIND:-127.0.0.1}:7007:7007"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  memory-monitor:
    image: busybox:1.38.0
    container_name: vps-memory-monitor
    command:
      - /bin/sh
      - -c
      - |
        mkdir -p /www/cgi-bin
        cat > /www/cgi-bin/memory <<'SCRIPT'
        #!/bin/sh
        PROC_DIR="/host-proc"
        eval "$$(awk '
          /^MemTotal:/ { total=$$2 }
          /^MemAvailable:/ { available=$$2 }
          END {
            used = total - available
            printf "TOTAL_MB=%d\n", total / 1024
            printf "AVAILABLE_MB=%d\n", available / 1024
            printf "USED_MB=%d\n", used / 1024
            printf "USED_PERCENT=%d\n", used * 100 / total
          }
        ' "$${PROC_DIR}/meminfo")"

        TOP_PID=0
        TOP_RSS_KB=0
        TOP_NAME=unknown
        for status in "$${PROC_DIR}"/[0-9]*/status; do
          [ -r "$${status}" ] || continue
          RSS_KB="$$(awk '/^VmRSS:/ { print $$2; exit }' "$${status}")"
          [ -n "$${RSS_KB}" ] || RSS_KB=0
          if [ "$${RSS_KB}" -gt "$${TOP_RSS_KB}" ]; then
            TOP_RSS_KB="$${RSS_KB}"
            TOP_PID="$$(basename "$$(dirname "$${status}")")"
            TOP_NAME="$$(awk -F '\t' '/^Name:/ { print $$2; exit }' "$${status}" | tr -cd 'A-Za-z0-9._:-')"
            [ -n "$${TOP_NAME}" ] || TOP_NAME=unknown
          fi
        done

        printf 'Content-Type: application/json\r\n\r\n'
        printf '{"used_mb":%s,"available_mb":%s,"total_mb":%s,"used_percent":%s,"threshold_mb":4096,"top_process":{"pid":%s,"name":"%s","rss_mb":%s}}\n' \
          "$${USED_MB}" "$${AVAILABLE_MB}" "$${TOTAL_MB}" "$${USED_PERCENT}" \
          "$${TOP_PID}" "$${TOP_NAME}" "$$((TOP_RSS_KB / 1024))"
        SCRIPT
        chmod +x /www/cgi-bin/memory
        exec httpd -f -p 8888 -h /www
    volumes:
      - /proc:/host-proc:ro
    ports:
      - "${DOZZLE_AGENT_BIND:-127.0.0.1}:8888:8888"
    restart: unless-stopped

networks:
  default:
    driver: bridge
    name: pangolin
