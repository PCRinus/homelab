services:
  dozzle:
    container_name: dozzle
    image: ghcr.io/amir20/dozzle:v10.5.0
    volumes:
      - ${DOCKER_SOCK}:/var/run/docker.sock
    ports:
      - 8081:8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  gatus:
    image: ghcr.io/twin/gatus:v5.35.0
    container_name: gatus
    ports:
      - 8082:8080
    volumes:
      - ./config.yaml:/config/config.yaml:ro
      - ${DOCKER_DATA}/gatus/data:/data
    env_file:
      - ${HOMELAB_RUNTIME_ENV_FILE:-../.env}
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - media-net
    dns:
      - 1.1.1.1
      - 1.0.0.1
      - 8.8.8.8
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "dozzle.enable=true"

  # Exposes host NIC link speed as HTTP endpoint for Gatus monitoring
  # Alerts if link drops below GbE (e.g., cable issue causing auto-negotiation to FE)
  link-speed-monitor:
    image: busybox:1.37
    container_name: link-speed-monitor
    command:
      - /bin/sh
      - -c
      - |
        mkdir -p /www/cgi-bin
        cat > /www/cgi-bin/speed <<'SCRIPT'
        #!/bin/sh
        SPEED=$$(cat /host-net-speed 2>/dev/null || echo "0")
        printf 'Content-Type: application/json\r\n\r\n'
        printf '{"speed":%s,"unit":"Mbps"}' "$$SPEED"
        SCRIPT
        chmod +x /www/cgi-bin/speed
        exec httpd -f -p 8888 -h /www
    volumes:
      - /sys/class/net/enp46s0/speed:/host-net-speed:ro
    networks:
      - media-net
    restart: unless-stopped
    labels:
      - "dozzle.enable=true"

networks:
  media-net:
    external: true
